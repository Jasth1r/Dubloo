<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dubloo - Map</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>
  <div class="homepage-fullscreen">
    <!-- Map -->
    <div id="map" class="map-leaflet-container"></div>

    <!-- Dock (placeholder) -->
    <div class="dock-frame">
      <div class="dock-logo">Dubloo</div>
      <div class="dock-buttons">
        <span class="dock-btn">📍 Locate Me</span>
        <span class="dock-btn">🚻 Nearest</span>
        <span class="dock-btn">✦ Lock Screen</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    var map = L.map('map').setView([47.655, -122.308], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // Placeholder markers
    var locations = [
      [47.6549, -122.3079, "Mary Gates Hall"],
      [47.6561, -122.3093, "Kane Hall"],
      [47.6556, -122.3098, "Odegaard Library"],
      [47.6555, -122.3083, "Suzzallo & Allen Libraries"],
      [47.6553, -122.3050, "HUB"],
      [47.6531, -122.3058, "Paul G. Allen Center"],
      [47.6590, -122.3101, "Denny Hall"],
      [47.6535, -122.3092, "Bagley Hall"]
    ];
    locations.forEach(function (loc) {
      L.circleMarker([loc[0], loc[1]], {
        radius: 6, color: '#666', fillColor: '#333', fillOpacity: 0.8
      }).bindPopup('<b>' + loc[2] + '</b><br>Restroom').addTo(map);
    });
  </script>
</body>
</html>
